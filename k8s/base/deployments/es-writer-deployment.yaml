apiVersion: apps/v1
kind: Deployment
metadata:
  name: es-writer-consumer
  namespace: observability-pipeline
spec:
  replicas: 1
  selector:
    matchLabels:
      app: es-writer-consumer
  template:
    metadata:
      labels:
        app: es-writer-consumer
    spec:
      containers:
        - name: es-writer-consumer
          image: es-writer-consumer:latest
          imagePullPolicy: IfNotPresent
          envFrom:
            - configMapRef:
                name: pipeline-config
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "300m"
              memory: "256Mi"
