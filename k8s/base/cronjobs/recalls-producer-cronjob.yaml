apiVersion: batch/v1
kind: CronJob
metadata:
  name: recalls-producer
  namespace: observability-pipeline
spec:
  # Every 15 minutes — frequent enough to demonstrate scheduling, light
  # enough not to hammer the public CPSC API.
  schedule: "*/15 * * * *"
  concurrencyPolicy: Forbid
  jobTemplate:
    spec:
      backoffLimit: 2
      template:
        spec:
          restartPolicy: OnFailure
          containers:
            - name: recalls-producer
              image: recalls-producer:latest
              imagePullPolicy: IfNotPresent
              envFrom:
                - configMapRef:
                    name: pipeline-config
              resources:
                requests:
                  cpu: "100m"
                  memory: "128Mi"
                limits:
                  cpu: "300m"
                  memory: "256Mi"
