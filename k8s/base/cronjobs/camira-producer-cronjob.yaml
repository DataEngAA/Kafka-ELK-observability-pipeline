apiVersion: batch/v1
kind: CronJob
metadata:
  name: camira-producer
  namespace: observability-pipeline
spec:
  # Every 30 minutes — this one scrapes a real external site, so checked
  # less frequently than the CPSC API to be a considerate scraper.
  schedule: "*/30 * * * *"
  concurrencyPolicy: Forbid
  jobTemplate:
    spec:
      backoffLimit: 2
      template:
        spec:
          restartPolicy: OnFailure
          containers:
            - name: camira-producer
              image: camira-producer:latest
              imagePullPolicy: IfNotPresent
              envFrom:
                - configMapRef:
                    name: pipeline-config
              resources:
                requests:
                  cpu: "100m"
                  memory: "128Mi"
                limits:
                  cpu: "300m"
                  memory: "256Mi"
