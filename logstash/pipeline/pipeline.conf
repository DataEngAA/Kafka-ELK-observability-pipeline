# Phase 4 — real grok parsing + enrichment, not bypassed straight to ES.
#
# Reads the combined app log (all 4 producer/consumer scripts write here),
# parses the structured log line format with grok, splits the bracketed
# "producer.recalls" style component into role + source, and enriches each
# line with which team/pipeline owns it via a static lookup (translate
# filter) — a stand-in for the kind of manufacturer/source metadata join
# described in docs/Phases.md Phase 4.

input {
  file {
    path => "/usr/share/logstash/app_logs/app.log"
    start_position => "beginning"
    # Demo-only: always read from the start of the file on (re)start rather
    # than tracking a persistent read-offset. Fine for this project's scale;
    # a real deployment would use a durable sincedb path instead.
    sincedb_path => "/dev/null"
  }
}

filter {
  grok {
    match => {
      "message" => "%{TIMESTAMP_ISO8601:log_timestamp} %{LOGLEVEL:log_level} \[%{DATA:component}\] %{GREEDYDATA:log_message}"
    }
    tag_on_failure => ["_grokparsefailure_main"]
  }

  if [component] {
    grok {
      match => { "component" => "%{WORD:pipeline_role}\.%{WORD:pipeline_source}" }
      tag_on_failure => ["_grokparsefailure_component"]
    }

    # Enrichment step: static lookup of which pipeline/team owns this
    # component, joined in rather than hardcoded per-source in the app code.
    translate {
      field => "pipeline_source"
      destination => "source_owner"
      dictionary => {
        "recalls"       => "CPSC Recalls Pipeline"
        "es_writer"     => "CPSC Recalls Pipeline"
        "camira"        => "Camira Fabric Monitor"
        "camira_writer" => "Camira Fabric Monitor"
      }
      fallback => "Unknown Pipeline"
    }
  }

  date {
    match => ["log_timestamp", "yyyy-MM-dd HH:mm:ss,SSS"]
    target => "@timestamp"
  }

  mutate {
    remove_field => ["log_timestamp", "event", "host", "log"]
  }
}

output {
  elasticsearch {
    hosts => ["http://elasticsearch:9200"]
    index => "pipeline-logs-%{+YYYY.MM.dd}"
  }
}
